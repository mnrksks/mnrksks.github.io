<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mounir Kuskusi | Paid Media & Digital Marketing</title>
    <meta name="description" content="Mounir Kuskusi - Head of Paid Media. Expert in performance marketing, social media strategy, and digital advertising across Meta, Google, TikTok, and more.">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 600px;
            padding: 3rem 2rem;
            text-align: center;
        }
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00A3FF, #0066CC);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            font-size: 2.5rem;
            font-weight: 700;
            color: white;
        }
        h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 0.5rem;
        }
        .tagline {
            font-size: 1.1rem;
            color: #888;
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        .links a {
            display: block;
            padding: 0.9rem 1.5rem;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            color: #e0e0e0;
            text-decoration: none;
            font-size: 1rem;
            transition: all 0.2s;
        }
        .links a:hover {
            background: #222;
            border-color: #00A3FF;
            color: #00A3FF;
        }
        .footer {
            margin-top: 3rem;
            font-size: 0.8rem;
            color: #555;
        }
        .footer a {
            color: #555;
            text-decoration: none;
        }
        .footer a:hover {
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="avatar">MK</div>

        <div class="links">
            <a href="https://www.linkedin.com/newsletters/digital-reach-7313583804498038784/" target="_blank">Digital Reach Newsletter</a>
            <a href="https://www.linkedin.com/in/mounir-kuskusi/" target="_blank">LinkedIn</a>
            <a href="https://www.youtube.com/@mounir.kuskusi" target="_blank">YouTube</a>
            <a href="https://www.tiktok.com/@mounir.kuskusi" target="_blank">TikTok</a>
